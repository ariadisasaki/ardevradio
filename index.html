<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Stream</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- HEADER + SEARCH STICKY -->
<div class="topbar">

<header>

<h2>📻 Radio Stream</h2>

<p>Live Streaming Radio</p>

</header>


<!-- PLAYER -->
<div class="player">

<div class="player-info">

<div class="player-logo">📻</div>

<div>

<div id="player-title">Belum diputar</div>

<div class="equalizer">

<span></span>

<span></span>

<span></span>

<span></span>

</div>

</div>

</div>

<div class="controls">

<button onclick="togglePlay()">▶</button>

</div>

</div>


<!-- SEARCH -->
<div class="search">

<input 
type="text" 
id="searchInput" 
placeholder="Cari channel..."
onkeyup="searchChannel()">

</div>

</div>



<!-- CHANNEL LIST -->

<div class="channel-grid" id="channelGrid">

<div class="channel" data-name="RDI" data-url="URL_STREAM_1" onclick="playChannel(0)">
RDI
</div>

<div class="channel" data-name="PPI" data-url="URL_STREAM_2" onclick="playChannel(1)">
PPI
</div>

<div class="channel" data-name="POP" data-url="URL_STREAM_3" onclick="playChannel(2)">
POP
</div>

<div class="channel" data-name="ROCK" data-url="URL_STREAM_4" onclick="playChannel(3)">
ROCK
</div>

<div class="channel" data-name="JAZZ" data-url="URL_STREAM_5" onclick="playChannel(4)">
JAZZ
</div>

<div class="channel" data-name="DANGDUT" data-url="URL_STREAM_6" onclick="playChannel(5)">
DANGDUT
</div>

</div>


</div>


<!-- AUDIO ENGINE -->

<audio id="audio"></audio>

<script src="script.js"></script>

</body>

</html>
